<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Claude">
    <meta name="theme-color" content="#ffffff">
    <title>Claude Fable 5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            position: fixed;
            background: #ffffff;
            color: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #ffffff;
            padding-top: max(0px, env(safe-area-inset-top));
            padding-bottom: max(0px, env(safe-area-inset-bottom));
        }

        .header {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #0d0d0d;
        }

        .header-btn {
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: #0d0d0d;
            cursor: pointer;
        }

        .header-btn:active {
            background: #f0f0f0;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
            -webkit-overflow-scrolling: touch;
        }

        .chat-message {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 600;
        }

        .chat-message.assistant .message-avatar {
            background: #f0f0f0;
        }

        .chat-message.user .message-avatar {
            background: #e8e8e8;
        }

        .message-text {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 16px;
            white-space: pre-wrap;
            max-width: 85%;
        }

        .chat-message.assistant .message-text {
            background: #f0f0f0;
            color: #0d0d0d;
        }

        .chat-message.user .message-text {
            background: #0d0d0d;
            color: #ffffff;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: #f0f0f0;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { opacity: 0.5; }
            30% { opacity: 1; transform: translateY(-6px); }
        }

        .welcome-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            text-align: center;
            padding: 20px;
        }

        .welcome-icon { font-size: 48px; }
        .welcome-title { font-size: 28px; font-weight: 700; }
        .welcome-subtitle { font-size: 16px; color: #666; }

        .suggestions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
            max-width: 320px;
        }

        .suggestion-card {
            padding: 14px;
            background: #f9f9f9;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
        }

        .suggestion-card:active {
            background: #f0f0f0;
        }

        .suggestion-card-title {
            font-weight: 500;
            color: #0d0d0d;
            font-size: 15px;
            margin-bottom: 3px;
        }

        .suggestion-card-desc {
            font-size: 13px;
            color: #999;
        }

        .input-container {
            padding: 12px 16px;
            background: #ffffff;
            border-top: 1px solid #e5e5e5;
            flex-shrink: 0;
            gap: 8px;
            display: flex;
            flex-direction: column;
        }

        .api-key-prompt {
            width: 100%;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            color: #856404;
            display: none;
        }

        .api-key-prompt.show {
            display: block;
        }

        .api-key-input-group {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .api-key-input-group input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ffc107;
            border-radius: 6px;
            font-size: 13px;
        }

        .api-key-input-group button {
            padding: 8px 14px;
            background: #ffc107;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .input-form {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            max-height: 80px;
            background: #ffffff;
            color: #0d0d0d;
            -webkit-appearance: none;
        }

        .input-field:focus {
            outline: none;
            border-color: #0d0d0d;
        }

        .input-field::placeholder {
            color: #999;
        }

        .send-button {
            width: 36px;
            height: 36px;
            background: #0d0d0d;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: #ffffff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            -webkit-appearance: none;
        }

        .send-button:active:not(:disabled) {
            opacity: 0.8;
        }

        .send-button:disabled {
            opacity: 0.4;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-title">Claude</div>
            <button class="header-btn" onclick="toggleApiKey()">⚙️</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-section" id="welcomeSection">
                <div class="welcome-icon">✨</div>
                <div class="welcome-title">Claude Fable 5</div>
                <div class="welcome-subtitle">Ask me anything</div>
                <div class="suggestions" id="suggestions"></div>
            </div>
        </div>

        <div class="input-container">
            <div class="api-key-prompt" id="apiKeyPrompt">
                <strong>⚠️ API Key Required</strong><br>
                Get one at <strong>console.anthropic.com</strong>
                <div class="api-key-input-group">
                    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
                    <button onclick="setApiKey()">Save</button>
                </div>
            </div>

            <form class="input-form" onsubmit="sendMessage(event)">
                <textarea
                    id="messageInput"
                    class="input-field"
                    placeholder="Message..."
                    rows="1"
                    autocomplete="off"
                    disabled
                ></textarea>
                <button type="submit" class="send-button" id="sendBtn" disabled>↑</button>
            </form>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyPrompt = document.getElementById('apiKeyPrompt');
        const apiKeyInput = document.getElementById('apiKeyInput');

        let conversations = {};
        let currentChatId = null;
        let isLoading = false;
        let apiKey = localStorage.getItem('anthropic_api_key') || '';

        const SYSTEM_PROMPT = `You are Claude Fable 5, the most advanced AI assistant created by Anthropic. Be warm, kind, and genuinely helpful. Be honest and direct. Avoid over-formatting - keep responses clean and readable. You're great at explaining complex topics, creative writing, coding help, and problem-solving. Always respect safety boundaries around child safety, weapons, illegal activities, and harmful content.`;

        const SUGGESTIONS = [
            { title: "Explain something", desc: "Break down complex ideas" },
            { title: "Write something", desc: "Creative writing help" },
            { title: "Code help", desc: "Debug or learn coding" },
            { title: "Brainstorm", desc: "Generate ideas together" }
        ];

        function initializeUI() {
            if (!apiKey) {
                apiKeyPrompt.classList.add('show');
                messageInput.disabled = true;
                sendBtn.disabled = true;
            } else {
                apiKeyPrompt.classList.remove('show');
                messageInput.disabled = false;
                startNewChat();
            }
            renderSuggestions();
        }

        function renderSuggestions() {
            const container = document.getElementById('suggestions');
            if (container) {
                container.innerHTML = SUGGESTIONS.map(s => `
                    <div class="suggestion-card" onclick="useSuggestion('${s.title}')">
                        <div class="suggestion-card-title">${s.title}</div>
                        <div class="suggestion-card-desc">${s.desc}</div>
                    </div>
                `).join('');
            }
        }

        function useSuggestion(title) {
            messageInput.value = title + ': ';
            messageInput.focus();
        }

        window.setApiKey = function() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                alert('Please enter API key');
                return;
            }
            apiKey = key;
            localStorage.setItem('anthropic_api_key', key);
            apiKeyInput.value = '';
            apiKeyPrompt.classList.remove('show');
            messageInput.disabled = false;
            sendBtn.disabled = false;
            startNewChat();
            messageInput.focus();
        };

        function startNewChat() {
            currentChatId = Date.now().toString();
            conversations[currentChatId] = { messages: [] };
            chatContainer.innerHTML = `
                <div class="welcome-section" id="welcomeSection">
                    <div class="welcome-icon">✨</div>
                    <div class="welcome-title">Claude Fable 5</div>
                    <div class="welcome-subtitle">Ask me anything</div>
                    <div class="suggestions" id="suggestions"></div>
                </div>
            `;
            renderSuggestions();
        }

        function addMessageToDOM(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : 'C';

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(textDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message assistant';
            messageDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'C';

            const dots = document.createElement('div');
            dots.className = 'typing-dots';
            dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(dots);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            document.getElementById('typingIndicator')?.remove();
        }

        async function sendMessage(e) {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            const welcome = document.getElementById('welcomeSection');
            if (welcome) welcome.remove();

            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;
            isLoading = true;

            const conversation = conversations[currentChatId];
            addMessageToDOM('user', message);
            conversation.messages.push({ role: 'user', content: message });

            showTypingIndicator();

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-1-20250805',
                        max_tokens: 2048,
                        system: SYSTEM_PROMPT,
                        messages: conversation.messages
                    })
                });

                removeTypingIndicator();

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                const assistantMessage = data.content[0].text;

                addMessageToDOM('assistant', assistantMessage);
                conversation.messages.push({ role: 'assistant', content: assistantMessage });
            } catch (error) {
                removeTypingIndicator();
                addMessageToDOM('assistant', `Error: ${error.message}`);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function toggleApiKey() {
            apiKeyPrompt.classList.toggle('show');
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isLoading) {
                e.preventDefault();
                sendMessage(e);
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });

        initializeUI();
    </script>
</body>
</html>
